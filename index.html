<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capybara Creative — Design &amp; Webflow Development Agency</title>
<meta name="description" content="Web development, visual identity, and creative strategy for businesses looking to stand out. High quality, fast results — shipped in two weeks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62.5..125,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function (user) {
      if (!user) {
        window.netlifyIdentity.on("login", function () {
          document.location.href = "/admin/";
        });
      }
    });
    window.netlifyIdentity.on("logout", function () {
      document.location.href = "/";
    });
  }
</script>

<nav class="nav">
  <a href="#top" aria-label="Capybara Creative" class="nav-logo"></a>
  <div class="nav-links mono">
    <a href="#work">WORK</a>
    <a href="#services">PACKAGES</a>
    <a href="#process">PROCESS</a>
    <a href="#contact">CONTACT</a>
  </div>
  <a href="#contact" class="nav-cta mono">START A PROJECT</a>
</nav>

<header id="top" class="hero">
  <div id="h-eyebrow" class="eyebrow mono hero-anim"></div>
  <h1 id="h-title" class="hero-anim"></h1>
  <div class="hero-foot hero-anim">
    <p id="h-subtitle"></p>
    <a href="#work" class="mono">SEE THE WORK ↓</a>
  </div>
</header>

<div class="marquee-wrap">
  <div id="h-marquee" class="marquee-track mono"></div>
</div>

<section id="work">
  <div class="section-head">
    <h2>Selected work</h2>
    <span id="h-work-label" class="mono"></span>
  </div>
  <div id="h-work-grid" class="work-grid"></div>
</section>

<section id="services">
  <h2 style="margin:0 0 48px;font-weight:900;text-transform:uppercase;font-size:clamp(32px,4vw,56px);letter-spacing:-0.02em;color:var(--ink)">Packages</h2>
  <div id="h-services"></div>
</section>

<section id="process">
  <div class="section-head">
    <h2>How we work</h2>
    <span id="h-process-label" class="mono" style="opacity:0.6"></span>
  </div>
  <div id="h-steps" class="process-grid"></div>
</section>

<section class="quote-section">
  <div class="quote-inner" data-reveal>
    <span id="h-quote-label" class="label mono"></span>
    <blockquote id="h-quote"></blockquote>
    <span id="h-quote-attr" class="attr mono"></span>
  </div>
</section>

<footer id="contact">
  <div class="footer-eyebrow mono">GETTING STARTED IS EASY</div>
  <a id="h-footer-email-link" href="mailto:hello@capybaracreative.xyz" class="footer-cta">Let's build.</a>
  <div class="footer-bottom mono">
    <span id="h-footer-email"></span>
    <div class="socials">
      <a id="h-social-instagram" href="#" target="_blank" rel="noopener">INSTAGRAM</a>
      <a id="h-social-linkedin" href="#" target="_blank" rel="noopener">LINKEDIN</a>
      <a id="h-social-dribbble" href="#" target="_blank" rel="noopener">DRIBBBLE</a>
    </div>
    <span id="h-copyright" class="copyright"></span>
  </div>
</footer>

<script src="js/render-home.js"></script>
<script src="js/main.js"></script>
</body>
</html>
